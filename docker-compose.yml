services:
  postgres-exporter-odoo-live:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter-odoo-live
    environment:
      DATA_SOURCE_NAME: "postgresql://odoo:123456@10.10.21.5:5432/postgres?sslmode=disable"
    command:
      - "--web.listen-address=:9191"
      - "--extend.query-path=/queries.yaml"
    volumes:
      - ./postgres/postgres_exporter_queries_odoo.yaml:/queries.yaml:ro
    restart: unless-stopped

  postgres-exporter-odoo-backup:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter-odoo-backup
    environment:
      DATA_SOURCE_NAME: "postgresql://odoo:123456@10.10.21.6:5432/postgres?sslmode=disable"
    command:
      - "--web.listen-address=:9192"
      - "--extend.query-path=/queries.yaml"
    volumes:
      - ./postgres/postgres_exporter_queries_odoo.yaml:/queries.yaml:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: ccdl-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts/alerts.yml:ro
      - ./prometheus/service_health_rules.yml:/etc/prometheus/rules/service_health_rules.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - alertmanager
      - postgres-exporter-odoo-live
      - postgres-exporter-odoo-backup
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: ccdl-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/templates:/etc/alertmanager/templates:ro
    restart: unless-stopped

  grafana:
    build:
      context: .
      dockerfile: grafana/Dockerfile
    image: ccdl-grafana:13.0.1-custom
    container_name: ccdl-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/json/ccdl_erp_overview.json
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/custom/custom.css:/usr/share/grafana/public/custom.css:ro
    depends_on:
      - prometheus
      - postgres-exporter-odoo-live
      - postgres-exporter-odoo-backup
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
