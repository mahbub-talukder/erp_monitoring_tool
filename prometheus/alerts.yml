groups:
  - name: server_health
    rules:
      - alert: NodeServerDown
        expr: up{job="node"} == 0
        for: 30s
        labels:
          severity: critical
          service: infra
          notify: infra_hosts
        annotations:
          server_status: Down
          host: '{{ $labels.host }}'
          instance: '{{ $labels.instance }}'

      - alert: NodeDockerDown
        expr: node_systemd_unit_state{job="node", name="docker.service", state="active"} == 0
        for: 30s
        labels:
          severity: critical
          service: infra
          notify: infra_hosts
        annotations:
          server_status: Docker Down
          host: '{{ $labels.host }}'
          instance: '{{ $labels.instance }}'

      - alert: NodeNginxDown
        expr: node_systemd_unit_state{job="node", name="nginx.service", state="active"} == 0
        for: 30s
        labels:
          severity: critical
          service: infra
          notify: infra_hosts
        annotations:
          server_status: Nginx Down
          host: '{{ $labels.host }}'
          instance: '{{ $labels.instance }}'

      - alert: NodeHighCPUUsage
        expr: |
          100 - (
            avg by (server, host, instance) (
              rate(node_cpu_seconds_total{job="node", mode="idle"}[5m])
            ) * 100
          ) > 75
        for: 30s
        labels:
          severity: warning
          service: infra
          notify: infra_hosts
        annotations:
          percentage_threshold: "75"
          host: '{{ $labels.host }}'
          instance: '{{ $labels.instance }}'
          cpu_usage: '{{ printf "%.2f" $value }}%'

      - alert: NodeHighMemoryUsage
        expr: |
          (
            1 - (
              node_memory_MemAvailable_bytes{job="node"} /
              node_memory_MemTotal_bytes{job="node"}
            )
          ) * 100 > 85
        for: 30s
        labels:
          severity: warning
          service: infra
          notify: infra_hosts
        annotations:
          percentage_threshold: "85"
          host: '{{ $labels.host }}'
          instance: '{{ $labels.instance }}'
          memory_usage: '{{ printf "%.2f" $value }}%'

      - alert: NodeHighDiskUsage
        expr: |
          100 * (
            1 - (
              node_filesystem_avail_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"} /
              node_filesystem_size_bytes{job="node", mountpoint="/", fstype!~"tmpfs|overlay"}
            )
          ) > 80
        for: 30s
        labels:
          severity: warning
          service: infra
          notify: infra_hosts
        annotations:
          percentage_threshold: "80"
          host: '{{ $labels.host }}'
          instance: '{{ $labels.instance }}'
          disk_usage: '{{ printf "%.2f" $value }}%'

      - alert: PatroniReplicaLagHigh
        expr: |
          clamp_min(
            (
              max by (scope) (patroni_xlog_location{job="patroni_odoo"})
              -
              max by (scope, name) (
                patroni_xlog_replayed_location{job="patroni_odoo"}
                and on (scope, name) (patroni_replica{job="patroni_odoo"} == 1)
              )
            ) / 1024 / 1024,
            0
          ) > 100
        for: 1m
        labels:
          severity: warning
          service: postgres
          notify: infra_hosts
          stack: odoo
        annotations:
          summary: Patroni replica lag is high (odoo)
          node: '{{ $labels.name }}'
          lag_mb: '{{ printf "%.2f" $value }}'

      - alert: ServiceRunningNodesLow
        expr: |
          (
            sum(patroni_postgres_running{job="patroni_odoo"})
            or on() vector(0)
          )
          and
          (
            (sum(patroni_postgres_running{job="patroni_odoo"}) or on() vector(0)) < 2
          )
        for: 1m
        labels:
          severity: warning
          service: postgres
          notify: infra_hosts
          other_service: Patroni Odoo
        annotations:
          summary: Patroni Postgres running node count is low (odoo)
          running_nodes: '{{ printf "%.0f" $value }}'
